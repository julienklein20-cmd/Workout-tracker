function loadDB(){
  try{const s=JSON.parse(localStorage.getItem("wt3")||"{}");
  return{sessions:s.sessions||JSON.parse(JSON.stringify(DEFAULT_SESSIONS)),week:s.week||JSON.parse(JSON.stringify(DEFAULT_WEEK)),history:s.history||{}};}
  catch{return{sessions:JSON.parse(JSON.stringify(DEFAULT_SESSIONS)),week:JSON.parse(JSON.stringify(DEFAULT_WEEK)),history:{}};}
}
let DB=loadDB();
let UI={tab:"plan",activeSession:null,modal:null,timer:null};
function saveDB(){try{localStorage.setItem("wt3",JSON.stringify(DB))}catch{}}
function uid(){return Math.random().toString(36).slice(2,8)}
function getToday(){return new Date().toISOString().split("T")[0]}
function getTodayName(){return new Date().toLocaleDateString("fr-FR",{weekday:"long"})}
function el(tag,props,...ch){
  const e=document.createElement(tag);
  Object.entries(props||{}).forEach(([k,v])=>{
    if(k==="style")e.style.cssText=v;
    else if(k==="innerHTML")e.innerHTML=v;
    else if(k.startsWith("on"))e[k]=v;
    else e.setAttribute(k,v);
  });
  ch.flat().forEach(c=>{if(c!=null)e.appendChild(typeof c==="string"?document.createTextNode(c):c)});
  return e;
}
function d(style,...ch){return el("div",{style},...ch)}
function s(style,text){return el("span",{style},text)}
function b(html,onclick,style){const bt=el("button",{style,onclick});bt.innerHTML=html;return bt;}

function render(){
  const app=document.getElementById("app");
  app.innerHTML="";
  if(UI.modal)renderModal(app);
  if(UI.timer)renderTimerOverlay(app);
  const tn=getTodayName();
  const tp=DB.week.find(w=>w.day.toLowerCase()===tn.toLowerCase());
  const ts=tp&&tp.sid?DB.sessions.find(s=>s.id===tp.sid):null;
  app.appendChild(d("padding:36px 24px 0",
    s("font-size:11px;font-weight:700;letter-spacing:3px;color:#E8642A;text-transform:uppercase;display:block;margin-bottom:4px","Mon Programme"),
    s("font-size:26px;font-weight:800;color:#fff;display:block","Workout Tracker 💪")
  ));
  if(UI.activeSession){renderLogger(app,UI.activeSession);return;}
  if(ts){
    app.appendChild(d("margin:20px 24px 0",
      d("background:linear-gradient(135deg,"+ts.color+"33,"+ts.color+"11);border:1.5px solid "+ts.color+"44;border-radius:14px;padding:14px 18px;display:flex;justify-content:space-between;align-items:center",
        d("",s("font-size:11px;color:"+ts.color+";font-weight:700;letter-spacing:1px;text-transform:uppercase;display:block","Aujourd'hui"),
          s("font-size:15px;font-weight:700;color:#fff;display:block;margin-top:2px",ts.focus)),
        b("C'est parti !",()=>{UI.activeSession=JSON.parse(JSON.stringify(ts));render();},"background:"+ts.color+";border:none;border-radius:10px;padding:8px 16px;color:#fff;font-weight:700;font-size:13px")
      )
    ));
  }
  const c=d("padding:24px 24px 0");
  app.appendChild(c);
  if(UI.tab==="plan")renderPlan(c,tn);
  else if(UI.tab==="sessions")renderSessions(c);
  else if(UI.tab==="history")renderHistory(c);
  else if(UI.tab==="stats")renderStats(c);
  app.appendChild(renderNav());
}

function renderNav(){
  const nav=d("position:fixed;bottom:0;left:0;right:0;background:#0d0d1a;border-top:1px solid #1a1a2e;display:flex;padding:10px 0 24px;max-width:480px;margin:0 auto;z-index:10");
  [["plan","📅","Planning"],["sessions","💪","Séances"],["history","📋","Historique"],["stats","📊","Stats"]].forEach(([id,icon,label])=>{
    nav.appendChild(b('<span style="font-size:20px">'+icon+'</span><span style="font-size:10px;font-weight:600;color:'+(UI.tab===id?"#E8642A":"#444")+';display:block;margin-top:3px">'+label+'</span>',
      ()=>{UI.tab=id;render();},"flex:1;background:none;border:none;display:flex;flex-direction:column;align-items:center;padding:6px 0"));
  });
  return nav;
}

function renderPlan(c,tn){
  c.appendChild(d("display:flex;justify-content:space-between;align-items:center;margin-bottom:16px",
    s("font-size:13px;font-weight:700;color:#aaa;letter-spacing:1px;text-transform:uppercase","Planning semaine"),
    b("✏️ Modifier",()=>{UI.modal={type:"editWeek"};render();},"background:#1a1a2e;border:none;border-radius:8px;padding:5px 12px;color:#aaa;font-size:12px")
  ));
  DB.week.forEach(({day,sid})=>{
    const session=sid?DB.sessions.find(ss=>ss.id===sid):null;
    const isT=day.toLowerCase()===tn.toLowerCase();
    const row=d("display:flex;align-items:center;gap:14px;padding:12px 16px;background:"+(isT?"#1e1e35":"#14141f")+";border-radius:12px;border:1.5px solid "+(isT?"#333":"transparent")+";margin-bottom:8px",
      s("width:36px;font-size:13px;color:"+(isT?"#fff":"#555")+";font-weight:"+(isT?"700":"400")+";flex-shrink:0",day.slice(0,3))
    );
    if(session){
      row.appendChild(d("width:8px;height:8px;border-radius:50%;background:"+session.color+";flex-shrink:0"));
      row.appendChild(d("flex:1",s("font-size:13px;font-weight:600;color:#ddd;display:block",session.name),s("font-size:11px;color:#555;display:block",session.focus)));
      row.appendChild(b("Démarrer",()=>{UI.activeSession=JSON.parse(JSON.stringify(session));render();},"background:"+session.color+"22;border:none;border-radius:8px;padding:5px 12px;color:"+session.color+";font-size:12px;font-weight:600"));
    } else {

}

function renderLogger(app,session){
  const today=getToday();
  const existing=DB.history[today]&&DB.history[today][session.id]?DB.history[today][session.id]:{};
  if(!session._data){
    session._data={};
    session.exercises.forEach(ex=>{
      session._data[ex.id]={done:existing[ex.id]?existing[ex.id].done:false,weight:existing[ex.id]?existing[ex.id].weight:(ex.tw||""),note:existing[ex.id]?existing[ex.id].note:""};
    });
  }
  const data=session._data;
  const wrap=d("padding:24px 24px 0");
  app.appendChild(wrap);
  wrap.appendChild(d("display:flex;align-items:center;gap:12px;margin-bottom:24px",
    b("←",()=>{UI.activeSession=null;render();},"background:none;border:none;color:#aaa;font-size:22px;padding:0"),
    d("",s("font-size:11px;font-weight:700;letter-spacing:2px;color:"+session.color+";text-transform:uppercase;display:block",session.name),
      s("font-size:20px;font-weight:700;color:#fff;display:block",session.focus))
  ));
  const pw=d("margin-bottom:20px");
  wrap.appendChild(pw);
  function updP(){
    const done=session.exercises.filter(ex=>data[ex.id]&&data[ex.id].done).length;
    const tot=session.exercises.length;
    pw.innerHTML="<div style='display:flex;justify-content:space-between;margin-bottom:8px'><span style='font-size:13px;color:#aaa'>Progression</span><span style='font-size:13px;font-weight:700;color:"+session.color+"'>"+done+"/"+tot+"</span></div><div style='height:6px;background:#2a2a3e;border-radius:99px'><div style='height:100%;width:"+((done/tot)*100)+"%%;background:"+session.color+";border-radius:99px;transition:width 0.3s'></div></div>";
  }
  updP();
  wrap.appendChild(d("margin-bottom:16px",
    b("⏱ Timer de repos",()=>{UI.timer={seconds:90,elapsed:0,running:false,interval:null};render();},"width:100%;background:#1a1a2e;border:1.5px solid "+session.color+"44;border-radius:12px;padding:10px;color:"+session.color+";font-weight:600;font-size:14px")
  ));
  const list=d("display:flex;flex-direction:column;gap:12px;margin-bottom:24px");
  wrap.appendChild(list);
  session.exercises.forEach(ex=>{
    if(!data[ex.id])data[ex.id]={done:false,weight:ex.tw||"",note:""};
    const dd=data[ex.id];
    const card=d("border-radius:14px;padding:16px 18px;transition:all 0.2s;background:"+(dd.done?session.color+"15":"#1a1a2e")+";border:1.5px solid "+(dd.done?session.color:"#2a2a3e"));
    list.appendChild(card);
    const row=d("display:flex;align-items:flex-start;gap:14px");
    card.appendChild(row);
    const cb=b(dd.done?"✓":"",()=>{
      dd.done=!dd.done;
      cb.innerHTML=dd.done?"✓":"";
      cb.style.background=dd.done?session.color:"transparent";
      cb.style.borderColor=dd.done?session.color:"#444";
      card.style.background=dd.done?session.color+"15":"#1a1a2e";
      card.style.borderColor=dd.done?session.color:"#2a2a3e";
      updP();
    },"width:28px;height:28px;border-radius:50%;border:2px solid "+(dd.done?session.color:"#444")+";background:"+(dd.done?session.color:"transparent")+";flex-shrink:0;color:#fff;font-size:14px;margin-top:2px");
    row.appendChild(cb);
    const info=d("flex:1");
    info.appendChild(s("font-size:15px;font-weight:600;color:#ccc;display:block;margin-bottom:6px",ex.name));
    info.appendChild(s("font-size:12px;color:#666;display:block;margin-bottom:10px",ex.sets+" séries × "+ex.reps+" reps"));
    const ins=d("display:flex;gap:10px");
    const wi=el("input",{type:"number",placeholder:"—",value:dd.weight,oninput:function(e){dd.weight=e.target.value;}});
    const ni=el("input",{type:"text",placeholder:"Facile, dur...",value:dd.note,oninput:function(e){dd.note=e.target.value;}});
    ins.appendChild(d("flex:1",s("font-size:11px;color:#666;display:block;margin-bottom:4px","Charge (kg)"),wi));
    ins.appendChild(d("flex:2",s("font-size:11px;color:#666;display:block;margin-bottom:4px","Note"),ni));
    info.appendChild(ins);
    row.appendChild(info);
  });
  const sv=b("Sauvegarder la séance",()=>{
    if(!DB.history[today])DB.history[today]={};
    DB.history[today][session.id]=JSON.parse(JSON.stringify(data));
    saveDB();
    sv.style.background="#2ABA6E";
    sv.innerHTML="✓ Sauvegardé !";
  },"width:100%;padding:14px;background:"+session.color+";border:none;border-radius:12px;color:#fff;font-weight:700;font-size:15px");
  wrap.appendChild(sv);
}

function renderTimerOverlay(app){
  const t=UI.timer;
  const ov=d("position:fixed;inset:0;background:#000c;z-index:200;display:flex;align-items:center;justify-content:center");
  app.appendChild(ov);
  const box=d("background:#13131f;border-radius:24px;padding:36px 32px;text-align:center;width:300px");
  ov.appendChild(box);
  box.appendChild(s("font-size:13px;font-weight:700;color:#aaa;letter-spacing:2px;text-transform:uppercase;display:block;margin-bottom:16px","TIMER DE REPOS"));
  const disp=s("font-size:64px;font-weight:800;color:#E8642A;display:block;margin-bottom:8px","");
  box.appendChild(disp);
  const presets=d("display:flex;gap:8px;justify-content:center;margin-bottom:20px");
  [30,60,90,120].forEach(sec=>{
    presets.appendChild(b(sec+"s",()=>{
      t.seconds=sec;t.elapsed=0;
      if(t.interval){clearInterval(t.interval);t.interval=null;t.running=false;}
      updD();startBtn.innerHTML="▶ Démarrer";
    },"background:#1a1a2e;border:none;border-radius:8px;padding:6px 12px;color:#aaa;font-size:13px"));
  });
  box.appendChild(presets);
  function updD(){
    const rem=Math.max(0,t.seconds-t.elapsed);
    const m=Math.floor(rem/60),sec2=rem%60;
    disp.textContent=(m>0?m+":":"")+String(sec2).padStart(m>0?2:1,"0");
    disp.style.color=rem<=0?"#2ABA6E":"#E8642A";
    if(rem<=0)disp.textContent="✓ GO !";
  }
  updD();
  const startBtn=b("▶ Démarrer",()=>{
    if(t.running){clearInterval(t.interval);t.interval=null;t.running=false;startBtn.innerHTML="▶ Reprendre";}
    else{
      if(t.elapsed>=t.seconds)t.elapsed=0;
      t.running=true;startBtn.innerHTML="⏸ Pause";
      t.interval=setInterval(()=>{t.elapsed++;updD();if(t.elapsed>=t.seconds){clearInterval(t.interval);t.interval=null;t.running=false;startBtn.innerHTML="▶ Recommencer";}},1000);
    }
  },"background:#E8642A;border:none;border-radius:12px;padding:12px 32px;color:#fff;font-weight:700;font-size:16px;width:100%;margin-bottom:12px");
  box.appendChild(startBtn);
  box.appendChild(b("Fermer",()=>{if(t.interval)clearInterval(t.interval);UI.timer=null;render();},"background:#1a1a2e;border:none;border-radius:12px;padding:10px;color:#aaa;font-size:14px;width:100%"));
}

function renderHistory(c){
  c.appendChild(s("font-size:13px;font-weight:700;color:#aaa;letter-spacing:1px;text-transform:uppercase;display:block;margin-bottom:16px","Historique"));
  const entries=Object.entries(DB.history).sort((a,b2)=>b2[0].localeCompare(a[0]));
  if(!entries.length){c.appendChild(d("text-align:center;padding:60px 20px;color:#444",s("font-size:40px;display:block;margin-bottom:16px","📋"),s("font-size:16px;display:block","Aucune séance enregistrée."),s("font-size:13px;display:block;margin-top:8px","Lance ta première séance !")));return;}
  entries.forEach(([date,sessions])=>{
    const card=d("background:#1a1a2e;border-radius:14px;padding:18px;margin-bottom:14px");
    card.appendChild(s("font-size:13px;color:#aaa;display:block;margin-bottom:12px",new Date(date+"T12:00:00").toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long"})));
    Object.entries(sessions).forEach(([sid,exercises])=>{
      const ss=DB.sessions.find(x=>x.id===sid);if(!ss)return;
      const done=Object.values(exercises).filter(e=>e.done).length;
      card.appendChild(d("margin-bottom:10px",
        d("display:flex;justify-content:space-between;align-items:center;margin-bottom:8px",
          s("font-size:14px;font-weight:600;color:"+ss.color,ss.name+" — "+ss.focus),
          s("font-size:13px;color:#aaa",done+"/"+ss.exercises.length+" ✓")
        )
      ));
      ss.exercises.forEach(ex=>{
        const dd=exercises[ex.id];if(!dd||!dd.done)return;
        card.appendChild(d("display:flex;justify-content:space-between;padding:5px 0 5px 12px;border-top:1px solid #2a2a3e",
          s("font-size:12px;color:#aaa",ex.name),
          s("font-size:12px;color:"+ss.color+";font-weight:600",(dd.weight?dd.weight+" kg":"")+(dd.note?" · "+dd.note:""))
        ));
      });
    });
    c.appendChild(card);
  });
}

function renderStats(c){
  c.appendChild(s("font-size:13px;font-weight:700;color:#aaa;letter-spacing:1px;text-transform:uppercase;display:block;margin-bottom:16px","Analyse & Progression"));
  const entries=Object.entries(DB.history).sort((a,b2)=>a[0].localeCompare(b2[0]));
  const total=entries.reduce((n,[,ss])=>n+Object.keys(ss).length,0);
  let streak=0;
  const now=new Date();
  for(let i=0;i<60;i++){const dd=new Date(now);dd.setDate(now.getDate()-i);const dk=dd.toISOString().split("T")[0];if(DB.history[dk]&&Object.keys(DB.history[dk]).length>0)streak++;else if(i>0)break;}
  c.appendChild(d("display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px",
    d("background:#1a1a2e;border-radius:14px;padding:16px;text-align:center",s("font-size:32px;font-weight:800;color:#E8642A;display:block",String(total)),s("font-size:12px;color:#666;display:block;margin-top:4px","Séances totales")),
    d("background:#1a1a2e;border-radius:14px;padding:16px;text-align:center",s("font-size:32px;font-weight:800;color:#2ABA6E;display:block",streak+"🔥"),s("font-size:12px;color:#666;display:block;margin-top:4px","Jours consécutifs"))
  ));
  const wm={};
  entries.forEach(([date,ss])=>{const dd=new Date(date+"T12:00:00");const ws=new Date(dd);ws.setDate(dd.getDate()-dd.getDay()+1);const wk=ws.toISOString().split("T")[0];if(!wm[wk])wm[wk]=0;wm[wk]+=Object.keys(ss).length;});
  const weeks=Object.entries(wm).sort((a,b2)=>a[0].localeCompare(b2[0])).slice(-8);
  if(weeks.length>0){
    c.appendChild(s("font-size:13px;font-weight:700;color:#aaa;display:block;margin-bottom:12px","Séances par semaine"));
    const cw=d("background:#1a1a2e;border-radius:14px;padding:16px;margin-bottom:24px");
    const mv=Math.max(...weeks.map(w=>w[1]),1);
    const bars=d("display:flex;align-items:flex-end;gap:6px;height:80px;margin-bottom:8px");
    weeks.forEach(([,count])=>{
      const bw=d("flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%;justify-content:flex-end");
      bw.appendChild(s("font-size:10px;color:#E8642A;font-weight:700",String(count)));
      bw.appendChild(d("width:100%;background:#E8642A;border-radius:4px 4px 0 0;min-height:4px;height:"+((count/mv)*100)+"%"));
      bars.appendChild(bw);
    });
    cw.appendChild(bars);
    const lb=d("display:flex;gap:6px");
    weeks.forEach(([wk])=>{const dd=new Date(wk+"T12:00:00");lb.appendChild(s("flex:1;font-size:9px;color:#444;text-align:center","S"+(Math.ceil(dd.getDate()/7))+"/"+(dd.getMonth()+1)));});
    cw.appendChild(lb);
    c.appendChild(cw);
  }
  c.appendChild(s("font-size:13px;font-weight:700;color:#aaa;display:block;margin-bottom:12px","Progression des charges"));
  const ep={};
  entries.forEach(([,ss])=>{Object.entries(ss).forEach(([sid,exs])=>{Object.entries(exs).forEach(([eid,ed])=>{if(!ed.done||!ed.weight)return;const session=DB.sessions.find(x=>x.id===sid);if(!session)return;const ex=session.exercises.find(e=>e.id===eid);if(!ex)return;if(!ep[ex.name])ep[ex.name]={color:session.color,records:[]};ep[ex.name].records.push(parseFloat(ed.weight));});});});
  if(!Object.keys(ep).length){c.appendChild(d("background:#1a1a2e;border-radius:14px;padding:20px;text-align:center;margin-bottom:12px",s("font-size:13px;color:#444","Fais quelques séances pour voir ta progression !")));return;}
  Object.entries(ep).forEach(([name,{color,records}])=>{
    if(!records.length)return;
    const first=records[0],last=records[records.length-1],max=Math.max(...records);
    const diff=Math.round((last-first)*10)/10;
    c.appendChild(d("background:#1a1a2e;border-radius:14px;padding:16px;margin-bottom:10px",
      d("display:flex;justify-content:space-between;align-items:center;margin-bottom:12px",
        s("font-size:14px;font-weight:600;color:#fff",name),
        s("font-size:13px;font-weight:700;color:"+(diff>=0?"#2ABA6E":"#E86060"),(diff>=0?"+":"")+diff+" kg")
      ),
      d("display:flex;gap:8px",
        d("flex:1;background:#0d0d1a;border-radius:10px;padding:10px;text-align:center",s("font-size:10px;color:#555;display:block;margin-bottom:4px","DÉPART"),s("font-size:18px;font-weight:700;color:"+color,first+"kg")),
        d("flex:1;background:#0d0d1a;border-radius:10px;padding:10px;text-align:center",s("font-size:10px;color:#555;display:block;margin-bottom:4px","ACTUEL"),s("font-size:18px;font-weight:700;color:"+color,last+"kg")),
        d("flex:1;background:#0d0d1a;border-radius:10px;padding:10px;text-align:center",s("font-size:10px;color:#555;display:block;margin-bottom:4px","MAX"),s("font-size:18px;font-weight:700;color:"+color,max+"kg"))
      )
    ));
  });
}

function renderModal(app){
  const bg=d("position:fixed;inset:0;background:#000a;z-index:100;display:flex;align-items:flex-end;justify-content:center");
  bg.onclick=function(e){if(e.target===bg){UI.modal=null;render();}};
  app.appendChild(bg);
  const m=d("background:#13131f;border-radius:24px 24px 0 0;padding:24px;width:100%;max-width:480px;max-height:85vh;overflow-y:auto");
  bg.appendChild(m);
  if(UI.modal.type==="editWeek")renderEditWeekModal(m);
  else if(UI.modal.type==="editSession")renderEditSessionModal(m);
  else if(UI.modal.type==="newSession")renderNewSessionModal(m);
}

function renderEditWeekModal(m){
  m.appendChild(s("font-size:18px;font-weight:700;color:#fff;display:block;margin-bottom:20px","Modifier le planning"));
  DB.week.forEach((item,i)=>{
    const sel=el("select",{onchange:function(e){DB.week[i].sid=e.target.value||null;saveDB();}});
    sel.appendChild(el("option",{value:""},"— Repos —"));
    DB.sessions.forEach(ss=>{const opt=el("option",{value:ss.id},ss.name+" — "+ss.focus);if(item.sid===ss.id)opt.selected=true;sel.appendChild(opt);});
    m.appendChild(d("display:flex;align-items:center;gap:12px;margin-bottom:12px",s("font-size:14px;color:#aaa;width:80px;flex-shrink:0",item.day),sel));
  });
  m.appendChild(b("✓ Fermer",()=>{UI.modal=null;render();},"width:100%;margin-top:16px;background:#E8642A;border:none;border-radius:12px;padding:14px;color:#fff;font-weight:700;font-size:15px"));
}

function renderEditSessionModal(m){
  const session=DB.sessions.find(ss=>ss.id===UI.modal.sessionId);if(!session)return;
  m.appendChild(s("font-size:18px;font-weight:700;color:"+session.color+";display:block;margin-bottom:20px","Modifier "+session.name));
  m.appendChild(s("font-size:12px;color:#666;display:block;margin-bottom:6px","Nom de la séance"));
  const ni=el("input",{type:"text",value:session.focus,style:"margin-bottom:16px"});
  m.appendChild(ni);
  m.appendChild(s("font-size:13px;font-weight:700;color:#aaa;display:block;margin-bottom:12px","Exercices"));
  session.exercises.forEach((ex,i)=>{
    const row=d("background:#1a1a2e;border-radius:12px;padding:12px;margin-bottom:8px");
    const nr=d("display:flex;gap:8px;margin-bottom:8px");
    const exni=el("input",{type:"text",value:ex.name,style:"flex:2",oninput:function(e){ex.name=e.target.value;}});
    nr.appendChild(exni);
    nr.appendChild(b("🗑",()=>{session.exercises.splice(i,1);saveDB();UI.modal={type:"editSession",sessionId:session.id};render();},"background:#E8606022;border:none;border-radius:8px;padding:6px 10px;color:#E86060;font-size:14px"));
    row.appendChild(nr);
    const numr=d("display:flex;gap:8px");
    const si=el("input",{type:"number",value:ex.sets,oninput:function(e){ex.sets=parseInt(e.target.value)||ex.sets;}});
    const ri=el("input",{type:"number",value:ex.reps,oninput:function(e){ex.reps=parseInt(e.target.value)||ex.reps;}});
    const ti=el("input",{type:"number",value:ex.tw||"",placeholder:"—",oninput:function(e){ex.tw=parseFloat(e.target.value)||null;}});
    numr.appendChild(d("flex:1",s("font-size:11px;color:#555;display:block;margin-bottom:4px","Séries"),si));
    numr.appendChild(d("flex:1",s("font-size:11px;color:#555;display:block;margin-bottom:4px","Reps"),ri));
    numr.appendChild(d("flex:1",s("font-size:11px;color:#555;display:block;margin-bottom:4px","Kg"),ti));
    row.appendChild(numr);
    m.appendChild(row);
  });
  m.appendChild(b("+ Ajouter un exercice",()=>{session.exercises.push({id:uid(),name:"Nouvel exercice",sets:3,reps:10,tw:null});saveDB();UI.modal={type:"editSession",sessionId:session.id};render();},"width:100%;background:#1a1a2e;border:1.5px dashed #444;border-radius:12px;padding:12px;color:#aaa;font-size:14px;margin-bottom:16px"));
  m.appendChild(b("✓ Sauvegarder",()=>{session.focus=ni.value||session.focus;saveDB();UI.modal=null;render();},"width:100%;background:#E8642A;border:none;border-radius:12px;padding:14px;color:#fff;font-weight:700;font-size:15px"));
}

function renderNewSessionModal(m){
  m.appendChild(s("font-size:18px;font-weight:700;color:#fff;display:block;margin-bottom:20px","Nouvelle séance"));
  const colors=["#E8642A","#2A7BE8","#2ABA6E","#BA2A8E","#E8C42A"];
  let cc=colors[0];
  const cr=d("display:flex;gap:10px;margin-bottom:16px");
  colors.forEach(col=>{
    const cb=b("",()=>{cc=col;cr.querySelectorAll("button").forEach(x=>x.style.outline="none");cb.style.outline="3px solid "+col;},"width:34px;height:34px;border-radius:50%;background:"+col+";border:none");
    if(col===cc)cb.style.outline="3px solid "+col;
    cr.appendChild(cb);
  });
  m.appendChild(s("font-size:12px;color:#666;display:block;margin-bottom:6px","Couleur"));
  m.appendChild(cr);
  m.appendChild(s("font-size:12px;color:#666;display:block;margin-bottom:6px","Nom"));
  const nmi=el("input",{type:"text",placeholder:"Ex: Épaules · Abdos",style:"margin-bottom:20px"});
  m.appendChild(nmi);
  m.appendChild(b("Créer la séance",()=>{
    if(!nmi.value.trim())return;
    const ids=["A","B","C","D","E","F","G"];
    const newId=ids.find(i=>!DB.sessions.find(ss=>ss.id===i))||uid();
    DB.sessions.push({id:newId,name:"Séance "+newId,focus:nmi.value.trim(),color:cc,exercises:[]});
    saveDB();UI.modal={type:"editSession",sessionId:newId};render();
  },"width:100%;background:#E8642A;border:none;border-radius:12px;padding:14px;color:#fff;font-weight:700;font-size:15px"));
}

render();
</script>
